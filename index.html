.container {
  width: 90%;
  max-width: 500px;
  padding: 30px 20px;
}

h1 {
  font-size: 32px;
  margin-bottom: 10px;
  letter-spacing: 2px;
}

p {
  color: #d6d6e7;
  font-size: 16px;
  line-height: 1.8;
  margin-bottom: 25px;
}

.card {
  width: 220px;
  height: 320px;
  margin: 0 auto 25px;
  border-radius: 18px;
  border: 1px solid rgba(255,255,255,0.2);
  background: linear-gradient(135deg, #1d1d38, #090913);
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
  font-size: 24px;
  line-height: 1.5;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 14px 34px rgba(0,0,0,0.45);
}

.status {
  font-size: 15px;
  color: #b9b9d4;
  margin-bottom: 18px;
  min-height: 24px;
}

button {
  background: #6c63ff;
  color: white;
  border: none;
  border-radius: 999px;
  padding: 12px 28px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s ease;
  box-shadow: 0 6px 18px rgba(108, 99, 255, 0.35);
}

button:hover {
  background: #7d75ff;
  transform: translateY(-2px);
}

button:active {
  transform: translateY(0);
}

.note {
  margin-top: 22px;
  font-size: 14px;
  color: #9fa0c3;
}

<body>
  <div class="container">
    <h1>🔮 靜心抽牌</h1>
    <p>讓自己安靜一下，深呼吸三次。當你準備好了，再按下按鈕，抽出此刻屬於你的牌。</p>

```
<div class="status" id="status">準備好了就開始抽牌</div>

<div class="card" id="card">點擊下方按鈕抽牌</div>

<button onclick="drawCard()">抽一張牌</button>

<div class="note">本頁為純抽牌模式，只顯示牌名與正逆位。</div>
```

  </div>

  <script>
    const tarotCards = [
      // 大阿爾克那
      "愚者","魔術師","女祭司","皇后","皇帝","教皇",
      "戀人","戰車","力量","隱者","命運之輪","正義",
      "倒吊人","死神","節制","惡魔","高塔","星星",
      "月亮","太陽","審判","世界",

      // 權杖
      "權杖王牌","權杖二","權杖三","權杖四","權杖五","權杖六","權杖七","權杖八","權杖九","權杖十",
      "權杖侍者","權杖騎士","權杖皇后","權杖國王",

      // 聖杯
      "聖杯王牌","聖杯二","聖杯三","聖杯四","聖杯五","聖杯六","聖杯七","聖杯八","聖杯九","聖杯十",
      "聖杯侍者","聖杯騎士","聖杯皇后","聖杯國王",

      // 寶劍
      "寶劍王牌","寶劍二","寶劍三","寶劍四","寶劍五","寶劍六","寶劍七","寶劍八","寶劍九","寶劍十",
      "寶劍侍者","寶劍騎士","寶劍皇后","寶劍國王",

      // 錢幣
      "錢幣王牌","錢幣二","錢幣三","錢幣四","錢幣五","錢幣六","錢幣七","錢幣八","錢幣九","錢幣十",
      "錢幣侍者","錢幣騎士","錢幣皇后","錢幣國王"
    ];

    function drawCard() {
      const card = document.getElementById("card");
      const status = document.getElementById("status");

      status.innerText = "正在感應中...";
      card.innerText = "✨";

      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * tarotCards.length);
        const cardName = tarotCards[randomIndex];

        const isReversed = Math.random() < 0.5;
        const result = isReversed
          ? cardName + "（逆位）"
          : cardName + "（正位）";

        card.innerText = result;
        status.innerText = "你的牌已經出現了";
      }, 1000);
    }
  </script>
